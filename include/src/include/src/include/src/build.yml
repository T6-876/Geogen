name: Build Geode Mod

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure project
        run: cmake -B build

      - name: Build project
        run: cmake --build build --config Release

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: geode-mod
          path: build
